<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Dino</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#70c5ce;
}

canvas{
display:block;
margin:auto;
background:linear-gradient(#6ec6ff,#c8f4ff);
}

#info{
position:absolute;
top:15px;
width:100%;
text-align:center;
font-family:Arial;
font-size:22px;
font-weight:bold;
color:white;
text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<div id="info">
Klik / Tekan SPACE untuk Terbang
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=450;
canvas.height=700;

const gravity=0.55;
const jump=-10;

let score=0;
let gameOver=false;

const bird={
x:100,
y:250,
w:45,
h:35,
velocity:0
};

let pipes=[];

function createPipe(){

let gap=180;

let topHeight=Math.random()*250+50;

pipes.push({

x:canvas.width,
top:topHeight,
bottom:canvas.height-topHeight-gap,
passed:false

});

}

setInterval(()=>{

if(!gameOver)
createPipe();

},1800);

function drawBird(){

ctx.fillStyle="#27ae60";

ctx.beginPath();

ctx.ellipse(
bird.x,
bird.y,
25,
18,
0,
0,
Math.PI*2
);

ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(bird.x+8,bird.y-4,4,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(bird.x+9,bird.y-4,2,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="orange";

ctx.beginPath();

ctx.moveTo(bird.x+20,bird.y);

ctx.lineTo(bird.x+35,bird.y+5);

ctx.lineTo(bird.x+20,bird.y+10);

ctx.fill();

}

function drawPipes(){

ctx.fillStyle="#2ecc71";

pipes.forEach(pipe=>{

ctx.fillRect(pipe.x,0,70,pipe.top);

ctx.fillRect(
pipe.x,
canvas.height-pipe.bottom,
70,
pipe.bottom
);

pipe.x-=3;

if(
bird.x+20>pipe.x &&
bird.x-20<pipe.x+70 &&
(
bird.y-18<pipe.top ||
bird.y+18>canvas.height-pipe.bottom
)
){
gameOver=true;
}

if(!pipe.passed && pipe.x+70<bird.x){

pipe.passed=true;
score++;

}

});

pipes=pipes.filter(p=>p.x>-80);

}

function updateBird(){

bird.velocity+=gravity;
bird.y+=bird.velocity;

if(bird.y>canvas.height){

gameOver=true;

}

if(bird.y<0){

bird.y=0;

}

}

function drawGround(){

ctx.fillStyle="#8bc34a";

ctx.fillRect(0,680,450,20);

}

function drawScore(){

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText(score,20,60);

}

function drawGameOver(){

ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,450,700);

ctx.fillStyle="white";
ctx.font="48px Arial";
ctx.fillText("GAME OVER",70,300);

ctx.font="28px Arial";
ctx.fillText("Score : "+score,150,360);

ctx.font="22px Arial";
ctx.fillText("Klik untuk Main Semula",95,420);

}

function loop(){

ctx.clearRect(0,0,450,700);

drawGround();

drawPipes();

updateBird();

drawBird();

drawScore();

if(gameOver){

drawGameOver();

return;

}

requestAnimationFrame(loop);

}

loop();

function flap(){

if(gameOver){

location.reload();
return;

}

bird.velocity=jump;

}

document.addEventListener("keydown",(e)=>{

if(e.code==="Space")
flap();

});

canvas.addEventListener("click",flap);

canvas.addEventListener("touchstart",flap);

</script>

</body>
</html>
